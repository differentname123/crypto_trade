<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>网格策略参数评价系统</title>
    <style>
        /* 苹果风格 CSS 变量 */
        :root {
            --bg-color: #f5f5f7; /* 苹果经典的淡灰背景色 */
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-primary: #1d1d1f; /* 柔和的深黑色 */
            --text-secondary: #86868b; /* 高级灰色，用于标签 */
            --accent-color: #0071e3; /* 苹果蓝 */
            --danger-color: #ff3b30;
            --success-color: #34c759;
            --border-radius-lg: 20px;
            --border-radius-sm: 12px;
            --shadow-sm: 0 4px 14px rgba(0,0,0,0.04);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.06);
        }

        body {
            /* 苹方/旧金山字体栈 */
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 20px 16px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* 标题样式 */
        .page-title {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            margin: 20px 0 40px;
            letter-spacing: -0.5px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            padding-left: 8px;
        }

        /* 布局容器 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        /* 卡片高级质感 */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--border-radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(255,255,255,0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeIn 0.6s ease-out;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .coin-name {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
        }

        /* 数据行样式：弱化标签，突出数值 */
        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .data-row:last-child {
            margin-bottom: 0;
        }

        .data-label {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }

        .data-value {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .price-highlight {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-color);
            letter-spacing: -0.5px;
        }

        /* 表单控件高级质感 */
        .control-panel {
            background: #ffffff;
            border-radius: var(--border-radius-lg);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        select, input {
            flex: 1;
            min-width: 150px;
            padding: 14px 16px;
            font-size: 16px;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: var(--border-radius-sm);
            background-color: #fafafa;
            color: var(--text-primary);
            outline: none;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        select:focus, input:focus {
            background-color: #ffffff;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.1);
        }

        button {
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background-color: var(--accent-color);
            border: none;
            border-radius: var(--border-radius-sm);
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            font-family: inherit;
            white-space: nowrap;
        }

        button:hover {
            background-color: #005bb5;
        }

        button:active {
            transform: scale(0.97);
        }

        /* 状态提示 */
        .status-msg {
            text-align: center;
            color: var(--text-secondary);
            font-size: 15px;
            padding: 20px;
        }

        .error-text {
            color: var(--danger-color);
            font-size: 14px;
        }

        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 卡片内部的自动输入框专用样式 (强制高优覆盖原有全局input样式) */
        .card-price-input {
            flex: none !important;
            min-width: unset !important;
            padding: 4px 8px !important;
            font-size: 22px !important;
            font-weight: 700 !important;
            color: var(--accent-color) !important;
            letter-spacing: -0.5px !important;
            background: rgba(255, 255, 255, 0.5) !important;
            border: 1px dashed rgba(0, 113, 227, 0.4) !important;
            border-radius: 6px !important;
            text-align: right !important;
            outline: none !important;
            width: 120px !important;
            transition: all 0.2s ease !important;
            box-sizing: border-box !important;
            -moz-appearance: textfield !important;
        }

        .card-price-input::placeholder {
            color: rgba(0, 113, 227, 0.3);
            font-weight: 400;
            font-size: 16px;
        }

        .card-price-input::-webkit-outer-spin-button,
        .card-price-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .card-price-input:focus {
            border: 1px solid var(--accent-color) !important;
            background: #ffffff !important;
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.1) !important;
        }

        /* 成功/拉取按钮颜色样式 */
        button.btn-success {
            background-color: var(--success-color);
        }
        button.btn-success:hover {
            background-color: #2eb350;
        }

        /* 手机端深度适配 */
        @media (max-width: 600px) {
            .page-title { font-size: 24px; margin: 10px 0 30px; }
            .form-group { flex-direction: column; }
            button { width: 100%; }
            select, input { width: 100%; box-sizing: border-box; }
            .card { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="page-title">策略参数评价系统</div>

    <div class="section-title">自定义推演</div>
    <div class="control-panel">
        <div class="form-group">
            <select id="coin-select"></select>
            <input type="number" id="price-input" placeholder="请输入预测价格 (如: 65000)" step="any">
            <button onclick="manualQuery()">查询</button>
        </div>
    </div>
    <div id="manual-content" style="margin-bottom: 40px;">
        </div>

    <div class="section-title">实时市场分析</div>
    <div id="auto-results" class="grid-container" style="margin-bottom: 20px;">
        <div class="status-msg">正在与实时市场数据同步...</div>
    </div>

    <div class="control-panel" style="margin-bottom: 40px;">
        <div class="form-group" style="margin-bottom: 15px;">
            <input type="number" id="threshold-input" placeholder="日均盈利率过滤阈值 (默认: 2)" value="2" step="any">
            <input type="number" id="offset-input" placeholder="价格偏移百分比 (默认: 5%)" value="5" step="any">
        </div>
        <div class="form-group">
            <button onclick="recalculateAuto()">使用输入参数重新计算并排序</button>
            <button onclick="autoLoad()" class="btn-success">拉取实时数据并计算</button>
        </div>
    </div>
</div>

<script>
    // 1. 固定的数据字典
const cryptoData = {
      'BTCUSDT': [
        {
          'price': 62352.539489119954,
          '最低价格': 60000,
          '平均每天赚钱速度(单位 %)': 6083.5317,
          '平均每天交易次数': 436.3636,
          '网格间距(单位 %)': 1.88,
          '置信度': '88%'
        }
      ],
      'ETHUSDT': [
        {
          'price': 3000.0,
          '最低价格': 1700,
          '平均每天赚钱速度(单位 %)': 0.87,
          '平均每天交易次数': 70.321,
          '网格间距(单位 %)': 0.27,
          '置信度': '92%'
        }
      ]
    };

    // 免费 CORS 代理池 (解决 IP 阻断与跨域限流)
    const PROXY_POOL = [
        "https://api.allorigins.win/raw?url=",
        "https://api.codetabs.com/v1/proxy?quest=",
        "https://corsproxy.io/?"
    ];

    // 维持在页面中的自动市场状态全局数组，供动态更新计算
    let globalMarketData = [];

    // 获取界面输入参数辅助函数
    function getOffset() {
        const val = document.getElementById('offset-input').value;
        return val === '' ? 5 : parseFloat(val);
    }

    function getThreshold() {
        const val = document.getElementById('threshold-input').value;
        return val === '' ? 2 : parseFloat(val);
    }

    // 健壮的代理降级抓取引擎
    async function smartFetch(targetUrl, signal) {
        const headers = { "Accept": "application/json" };

        try {
            // 1. 优先尝试直连 (速度最快)
            let res = await fetch(targetUrl, { headers, signal });

            // 2. 拦截被风控的状态码: 451(地域屏蔽), 403(WAF拦截), 429(限流), 418(IP拉黑)
            if (res.status === 451 || res.status === 403 || res.status === 429 || res.status === 418) {
                // 增加时间戳防止公共代理节点缓存老旧的金融数据
                const cacheBuster = targetUrl.includes('?') ? `&_t=${Date.now() + Math.random()}` : `?_t=${Date.now() + Math.random()}`;
                const finalUrl = targetUrl + cacheBuster;

                // 乱序代理池，避免请求尖峰始终打在同一个免费节点上
                const shuffledProxies = [...PROXY_POOL].sort(() => 0.5 - Math.random());

                for (let proxyBase of shuffledProxies) {
                    try {
                        let proxyRes = await fetch(proxyBase + encodeURIComponent(finalUrl), { headers, signal });

                        // 校验代理返回的是否真为 JSON 数据，防止代理自身报错吐出 HTML 页面
                        const contentType = proxyRes.headers.get("content-type");
                        if (proxyRes.ok && contentType && contentType.includes("application/json")) {
                            return proxyRes;
                        }
                    } catch(e) {
                        // 当前代理失效，静默跳过，尝试下一个代理
                        continue;
                    }
                }
                throw new Error(`直连受限(状态码:${res.status})，且所有代理节点尝试失败`);
            }

            // 3. 校验直连是否异常返回了非 JSON 格式 (例如机场IP遇到 Cloudflare 盾)
            const contentType = res.headers.get("content-type");
            if (res.ok && contentType && !contentType.includes("application/json")) {
                throw new Error("直连返回了非 JSON 格式数据");
            }

            return res;
        } catch (error) {
            // 将包含超时 (AbortError) 在内的网络底层异常抛出给外层
            throw error;
        }
    }

    // 初始化下拉菜单
    function initSelect() {
        const select = document.getElementById('coin-select');
        for (const coin in cryptoData) {
            const option = document.createElement('option');
            option.value = coin;
            option.textContent = coin;
            select.appendChild(option);
        }
    }

    // 寻找最接近的价格数据 (已增加偏移百分比逻辑)
    function findClosestData(symbol, targetPrice, offset = 5) {
        const strategies = cryptoData[symbol];
        if (!strategies || strategies.length === 0) return null;

        // 基于价格偏移百分比计算新的目标匹配价格
        const adjustedTargetPrice = targetPrice * (1 + offset / 100);

        return strategies.reduce((prev, curr) => {
            return (Math.abs(curr.price - adjustedTargetPrice) < Math.abs(prev.price - adjustedTargetPrice) ? curr : prev);
        });
    }

// 从币安公开API获取最新价格 (彻底解决跨域拦截导致的降级失效)
    async function fetchCurrentPrice(symbol) {
        const controller = new AbortController();
        // 超时稍微延长至 8 秒，因为如果触发代理池遍历需要更多回源时间
        const timeoutId = setTimeout(() => controller.abort(), 8000);

        try {
            let response;

            try {
                // 1. 优先尝试币安 现货(Spot) API
                response = await smartFetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`, controller.signal);

                // 如果后端明确返回了非 200 错误，主动抛出异常以触发下面的 catch 降级
                if (!response.ok) {
                    throw new Error('现货接口返回非200状态码');
                }
            } catch (spotError) {
                // 2. 核心修复：无论是 400 错误引发的 CORS 跨域报错，还是真断网了，都会被这里的 catch 拦截
                console.warn(`${symbol} 现货接口未找到或被跨域拦截，正在尝试请求 U本位合约接口...`);

                // 3. 强制回退到 币安 U本位合约(Futures) API
                response = await smartFetch(`https://fapi.binance.com/fapi/v1/ticker/price?symbol=${symbol}`, controller.signal);

                // 如果合约也没有这个币，抛出最终异常
                if (!response.ok) {
                    throw new Error('现货和合约API均未找到该交易对');
                }
            }

            clearTimeout(timeoutId);
            const data = await response.json();
            return parseFloat(data.price);

        } catch (error) {
            clearTimeout(timeoutId);
            console.warn(`获取 ${symbol} 价格失败, 但不影响本地查询功能:`, error.message || error);
            return null; // 静默失败，返回null
        }
    }

    // 渲染卡片HTML (增加对空数据/超时数据的健壮性处理，并引入资金占比和跌幅信息)
    function renderCard(symbol, currentPrice, matchedData, isAuto = true, isSuccess = true, fundRatio = null) {
        // 如果价格为空（拉取失败且尚未填写），则替换为安全空白符
        const safePrice = (currentPrice !== null && currentPrice !== undefined) ? currentPrice : '';
        const displayPriceStr = safePrice ? `$${safePrice.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 4})}` : '-';

        // 如果是实时市场(isAuto)，允许用户直接在卡片输入；反之则锁定显示普通文字
        const priceDisplay = isAuto
            ? `<div style="display: flex; align-items: center; justify-content: flex-end;">
                 <span style="font-size: 20px; font-weight: 700; color: var(--accent-color); margin-right: 4px;">$</span>
                 <input type="number" class="card-price-input" data-symbol="${symbol}" value="${safePrice}" placeholder="--" step="any">
               </div>`
            : `<div class="price-highlight">${displayPriceStr}</div>`;

        // 如果拉取失败，在标题旁边友好地挂载一个红色的状态徽章
        const errorBadge = (isAuto && !isSuccess) ? `<span style="font-size:12px; color:var(--danger-color); margin-left:8px; font-weight:normal;">(获取超时)</span>` : '';

        // 数据解析
        const matchedPrice = matchedData ? `$${matchedData.price.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 4})}` : '-';
        const profit = matchedData ? matchedData['平均每天赚钱速度(单位 %)'] : '-';
        const trades = matchedData ? matchedData['平均每天交易次数'] : '-';
        const gridGap = matchedData ? matchedData['网格间距(单位 %)'] : '-';
        const confidence = matchedData && matchedData['置信度'] !== undefined ? matchedData['置信度'] : '-';

        // 计算距离今年最低价格的跌幅 %
        let dropToLowest = '-';
        if (matchedData && matchedData['最低价格'] !== undefined && matchedData.price > 0) {
            dropToLowest = (((matchedData.price - matchedData['最低价格']) / matchedData.price) * 100).toFixed(2);
        }

        const fundRatioDisplay = fundRatio !== null ? fundRatio : '-';

        // 返回包含所有字段的卡片 HTML
        return `
            <div class="card">
                <div class="card-header">
                    <div class="coin-name">${symbol}${errorBadge}</div>
                    ${priceDisplay}
                </div>

                <div class="data-row">
                    <div class="data-label">最匹配策略价格</div>
                    <div class="data-value">${matchedPrice}</div>
                </div>

                <div class="data-row">
                    <div class="data-label">日均盈利率 (%)</div>
                    <div class="data-value">${profit}</div>
                </div>

                <div class="data-row">
                    <div class="data-label">日均交易次数</div>
                    <div class="data-value">${trades}</div>
                </div>

                <div class="data-row">
                    <div class="data-label">网格间距 (%)</div>
                    <div class="data-value">${gridGap}</div>
                </div>

                <div class="data-row">
                    <div class="data-label">置信度</div>
                    <div class="data-value">${confidence}</div>
                </div>

                <div class="data-row" style="margin-top: 10px; padding-top: 10px; border-top: 1px dashed rgba(0,0,0,0.05);">
                    <div class="data-label">推荐资金占比 (%)</div>
                    <div class="data-value" style="color: var(--success-color); font-weight: 700;">${fundRatioDisplay}</div>
                </div>

                <div class="data-row">
                    <div class="data-label">距离今年最低价格的跌幅 (%)</div>
                    <div class="data-value" style="color: var(--danger-color);">${dropToLowest}</div>
                </div>
            </div>
        `;
    }

    // 页面加载或拉取实时数据的逻辑 (已使用全局变量供排序重算)
    async function autoLoad() {
        const autoResultsDiv = document.getElementById('auto-results');
        autoResultsDiv.innerHTML = '<div class="status-msg">正在与实时市场数据同步...</div>';

        const offset = getOffset();

        // 并发拉取所有币种，返回对象而非直接生成字符串，以便后续排序
        const fetchPromises = Object.keys(cryptoData).map(async (symbol) => {
            const currentPrice = await fetchCurrentPrice(symbol);
            // 即使失败，也强行返回对象，提供后续手动修改入口。传入 offset 进行匹配
            const closestData = currentPrice !== null ? findClosestData(symbol, currentPrice, offset) : null;
            return {
                symbol: symbol,
                currentPrice: currentPrice,
                closestData: closestData,
                success: currentPrice !== null
            };
        });

        // 保存状态至全局用于重绘
        globalMarketData = await Promise.all(fetchPromises);
        renderAutoResults();
    }

    // 提取通用卡片排序、过滤和渲染的方法
    function renderAutoResults() {
        const autoResultsDiv = document.getElementById('auto-results');
        const threshold = getThreshold();

        // 1. 根据日均盈利率阈值过滤。如果没有拉取成功(closestData为null)，保留展示方便手动输入价格
        let filteredData = globalMarketData.filter(item => {
            if (item.closestData) {
                return item.closestData['平均每天赚钱速度(单位 %)'] >= threshold;
            }
            return true;
        });

        // 2. 计算过滤后所有的置信度总和，用于算资金占比
        let totalConfidence = 0;
        filteredData.forEach(item => {
            if (item.closestData && item.closestData['置信度']) {
                totalConfidence += parseFloat(item.closestData['置信度']);
            }
        });

        // 3. 排序：按照 盈利率从高到底排序。如果都没有数据，保留原位。没有数据的项永远垫底。
        filteredData.sort((a, b) => {
            if (!a.closestData && !b.closestData) return 0;
            if (!a.closestData) return 1;
            if (!b.closestData) return -1;

            const profitA = a.closestData['平均每天赚钱速度(单位 %)'];
            const profitB = b.closestData['平均每天赚钱速度(单位 %)'];
            return profitB - profitA; // 降序
        });

        // 4. 计算占比并渲染
        const cardsHtmlArray = filteredData.map(item => {
            let fundRatio = '-';
            // 计算推荐资金占比
            if (item.closestData && item.closestData['置信度'] && totalConfidence > 0) {
                const conf = parseFloat(item.closestData['置信度']);
                fundRatio = ((conf / totalConfidence) * 100).toFixed(2);
            }
            return renderCard(item.symbol, item.currentPrice, item.closestData, true, item.success, fundRatio);
        });

        if (cardsHtmlArray.length === 0) {
            autoResultsDiv.innerHTML = '<div class="status-msg">没有满足当前过滤条件的策略数据。</div>';
        } else {
            autoResultsDiv.innerHTML = cardsHtmlArray.join('');
        }
    }

    // 获取用户填写的Input值并重新匹配参数和排序功能
    function recalculateAuto() {
        // 读取所有实时市场卡片内的输入框
        const inputs = document.querySelectorAll('.card-price-input');
        const offset = getOffset();

        inputs.forEach(input => {
            const symbol = input.getAttribute('data-symbol');
            const newPrice = parseFloat(input.value);

            const item = globalMarketData.find(d => d.symbol === symbol);
            if (item) {
                // 如果用户输入了有效数字，则强制清除“超时状态”并匹配本地数据
                if (!isNaN(newPrice)) {
                    item.currentPrice = newPrice;
                    item.closestData = findClosestData(symbol, newPrice, offset);
                    item.success = true;
                } else {
                    // 如果被用户清空，则回退为空白占位状态
                    item.currentPrice = null;
                    item.closestData = null;
                    item.success = false;
                }
            }
        });

        // 计算完毕后按最新的盈利率触发重新过滤、排序和渲染
        renderAutoResults();
    }

    // 手动查询逻辑 (支持应用底部的偏移百分比)
    function manualQuery() {
        const symbol = document.getElementById('coin-select').value;
        const priceInput = document.getElementById('price-input').value;
        const contentDiv = document.getElementById('manual-content');
        const offset = getOffset();

        if (!priceInput) {
            // 原生体验：让输入框微微闪烁或聚焦，而不是弹丑陋的alert
            const inputElement = document.getElementById('price-input');
            inputElement.focus();
            inputElement.style.borderColor = 'var(--danger-color)';
            setTimeout(() => inputElement.style.borderColor = '', 1000);
            return;
        }

        const inputPrice = parseFloat(priceInput);
        const closestData = findClosestData(symbol, inputPrice, offset);

        // 为了布局美观，手动查询的结果套一个单列的Grid容器。因为是单项，占比默认为100
        contentDiv.innerHTML = `
            <div class="grid-container" style="grid-template-columns: 1fr; margin-bottom: 0;">
                ${renderCard(symbol, inputPrice, closestData, false, true, "100.00")}
            </div>
        `;
    }

    // 启动
    window.onload = () => {
        initSelect();
        // 自动拉取在后台执行，不会卡主页面和JS主线程
        autoLoad();
    };
</script>
</body>
</html>
